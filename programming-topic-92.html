<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Programming – Strings</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header><h1>C++ Strings – Basics</h1></header>
<main>
  <h2>📘 String Declare & Print</h2>
  <pre>
string name = "EduIgnite";
cout << name; // Output: EduIgnite
  </pre>

  <h2>🧠 Functions</h2>
  <ul>
    <li>name.length(); → returns length</li>
    <li>name.find("i"); → returns index</li>
    <li>name.substr(0, 3); → returns "Edu"</li>
  </ul>
</main>
<footer>Code Smarter – @eduignite_official</footer>
</body>
</html>
