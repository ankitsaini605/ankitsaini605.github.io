<header><h1>📊 Mixture Rule (Alligation)</h1></header>
<main>
<p>Use Alligation to find average % concentration of two quantities.</p>
<h2>⚖️ Example</h2>
<p>Milk 30%, Water 70% → Average of ratio 2:1 = (70–X)/(X–30)</p>
<h3>🔥 Tip:</h3><p>Use cross subtraction logic to balance ratios.</p>
</main>
