<!DOCTYPE html>

<head><title>Aptitude Profit & Loss</title></head>
<body>
<h1>📈 Profit & Loss – Smart Tricks</h1>
<ul>
  <li>Profit = SP - CP</li>
  <li>Loss = CP - SP</li>
  <li>Profit % = (Profit/CP) × 100</li>
</ul>
<p>Example: If CP = ₹100, Profit = 25%, then SP = ₹125</p>
<p>If SP = ₹80, Loss = 20%, then CP = ₹100</p>
</body>
</html>
