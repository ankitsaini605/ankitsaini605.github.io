<!DOCTYPE html>
<html>
<head><title>Percentage Increase/Decrease</title></head>
<body>
<h1>📈 Percentage Tricks</h1>
<h2>📌 Formula</h2>
<p>Increase = (Difference / Original) × 100</p>
<p>If price increases 25%, new price = 125% of original</p>
<h2>🧠 Example</h2>
<ul>
  <li>₹100 → ₹120 → Increase = 20%</li>
  <li>₹500 → ₹450 → Decrease = 10%</li>
</ul>
</body></html>
