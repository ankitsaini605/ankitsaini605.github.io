<!DOCTYPE html>
<html>
<head><title>Programming  C++ Arrays</title></head>
<body>
<header><h1>📘 Arrays in C++ – Declaration + Loop</h1></header>
<main>
<pre>
int arr[5] = {{1, 2, 3, 4, 5}};
for(int i = 0; i < 5; i++) {{
  cout << arr[i] << " ";
}} // Output: 1 2 3 4 5
</pre>
<h3>💡 Array Tips</h3>
<ul><li>Use loops</li><li>Start from 0 index</li><li>Watch for overflow</li></ul>
</main>
</body>
</html>
