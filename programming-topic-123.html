<!DOCTYPE html>
<html><head><title>C++ Pointers</title></head><body>
<h1>💻 Pointers in C++</h1>
<h2>📌 Declare & Use</h2>
<pre>
int a = 10;
int *p = &a;
cout << *p;  // Output: 10
</pre>

<h2>📈 Why Use</h2>
<ul>
  <li>Reference passing</li>
  <li>Memory management</li>
  <li>Efficient data handling</li>
</ul>

<h2>🧠 Real Use</h2>
<p>Used in dynamic memory (new/delete), linked lists, recursion, etc.</p>
</body></html>
