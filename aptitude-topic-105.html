<header><h1>Profit & Loss – Formulas + Examples</h1></header>
<main>
  <h2>📌 Key Formula</h2>
  <ul>
    <li>Profit = SP - CP</li>
    <li>Loss = CP - SP</li>
    <li>Profit % = (Profit / CP) × 100</li>
  </ul>

  <h2>🧮 Example</h2>
  <p>CP = ₹100, Profit = 20% → SP = 120</p>
  <p>SP = ₹150, Loss = 10% → CP = ₹166.67</p>
</main>
