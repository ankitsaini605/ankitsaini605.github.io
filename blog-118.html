<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <meta name="description" content="Stay ahead in web dev: Learn about Jamstack, React, performance optimization, SEO, PWAs—with code playgrounds, interactive demos, quizzes, progress tracker, PDF resources, dark mode, multilingual, Firebase auth, notifications."/>
  <script type="application/ld+json">
  {
    "@context":"https://schema.org",
    "@type":"BlogPosting",
    "headline":"Web Development Trends 2025",
    "author":{"@type":"Person","name":"Ankit Saini"},
    "publisher":{"@type":"Organization","name":"EduIgnite","logo":{"@type":"ImageObject","url":"https://eduignite.com/logo.png"}},
    "datePublished":"2025-06-12",
    "image":"https://eduignite.com/images/web-trends.jpg",
    "description":"Explore top web development trends like Jamstack, React, PWAs, performance, SEO, with interactive demos, code editor, quiz, track progress, PDF download, Firebase login, multilingual, dark mode and notifications."
  }
  </script>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body, input, textarea, select, button { font-family:'Segoe UI',sans-serif; transition: background .3s, color .3s; }
    body.dark { background:#121212; color:#ddd; }
    header, footer { background:#00695c; color:white; padding:1rem; }
    nav a, nav button { margin:0 .5rem; color:white; text-decoration:none; }
    .main { max-width:1000px; margin:auto; padding:1rem; }
    .section, .tool-box, .quiz-box { background:#e0f2f1; padding:1.5rem; margin:2rem 0; border-radius:8px; }
    .btn { padding:.7rem 1.2rem; margin:.3rem; border:none; border-radius:4px; cursor:pointer; transition: transform .2s;}
    .btn:hover { transform: scale(1.05); }
    .btn-primary { background:#00897b; color:white; }
    .bookmark { float:right; font-size:1.4rem; cursor:pointer; color:#ff7043; }
    .progress-bar { background:#ddd; overflow:hidden; border-radius:6px; height:12px; margin:10px 0; }
    .progress-filled { background:#00897b; width:0%; height:100%; transition: width .3s; }
    #trendChart, #codeDemo, #liveOutput { max-width:100%!important; height:auto!important; font-family:monospace; background:#f5f5f5; padding:1rem; border-radius:4px; }
    @media(max-width:768px){ nav{display:block;text-align:center;} nav a,nav button{display:block;margin:.4rem 0;} }
  </style>
</head>
<body>
<header>
  <h1>Blog #118 – Web Dev Trends 2025</h1>
  <nav>
    <a href="index.html">Home</a> | <a href="blog.html">Blog Home</a> |
    <button id="langEn" class="btn btn-dark">EN</button>
    <button id="langHi" class="btn btn-dark">HI</button>
    <span id="userContainer"></span>
    <button id="darkToggle" class="btn btn-dark">Dark Mode</button>
  </nav>
</header>

<div class="main">
  <!-- Trends Chart -->
  <div class="tool-box">
    <h3 id="toolTitle">Trend Popularity</h3>
    <canvas id="trendChart"></canvas>
  </div>

  <!-- Live Code Playground -->
  <section class="section">
    <h2 id="codeTitle">Live Demo: Jamstack + React Example</h2>
    <textarea id="codeDemo" rows="6">// Paste JSX here
function Hello() {
  return (<h2>Hello from EduIgnite 🚀</h2>);
}</textarea>
    <button class="btn btn-primary" onclick="runDemo()">Run Demo</button>
    <div id="liveOutput"></div>
  </section>

  <!-- Quiz Section -->
  <div class="quiz-box">
    <h3 id="quizTitle">Quiz: Web Trends 2025 (10 Qs)</h3>
    <div class="progress-bar"><div id="quizBar" class="progress-filled"></div></div>
    <p id="quizQuestion">Press Start</p>
    <ul id="quizOptions"></ul>
    <button class="btn" onclick="showHint()">💡 Hint</button>
    <p id="quizHint"></p>
    <p id="quizFeedback"></p>
    <button id="bookmarkQuiz" class="bookmark">☆</button><br>
    <button id="startQuiz" class="btn btn-primary">Start Quiz</button>
  </div>

  <!-- Performance Tracker & PDF -->
  <section class="section">
    <h3 id="perfTitle">Performance Tracker</h3>
    <canvas id="perfChart"></canvas><br>
    <button id="savePerf" class="btn btn-primary">Save Score</button>
  </section>
  <section class="section affiliate">
    <button id="downloadPDF" class="btn btn-primary btn-block">Download Web Trends PDF</button>
  </section>
</div>

<footer>
  <p>©2025 EduIgnite | <a href="https://instagram.com/eduignite_official" style="color:white">Instagram</a> | <a href="https://t.me/eduignite_official" style="color:white">Telegram</a></p>
</footer>

<script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  // Firebase Auth
  firebase.initializeApp({apiKey:"KEY",authDomain:"eduignite.firebaseapp.com",projectId:"eduignite",appId:"APPID"});
  const auth = firebase.auth(), userContainer = document.getElementById('userContainer');
  auth.onAuthStateChanged(u=>userContainer.innerHTML=u?`Hi, ${u.email} <button onclick="logout()">Logout</button>`:`<button onclick="login()">Login</button>`);
  function login(){const e=prompt("Email"),p=prompt("Password");auth.signInWithEmailAndPassword(e,p).catch(console.error);}
  function logout(){auth.signOut();}

  // Dark Mode
  document.getElementById('darkToggle').onclick=()=>{
    const d=document.body.classList.toggle('dark');
    localStorage.setItem('darkMode',d);
  };
  if(localStorage.getItem('darkMode')==='true')document.body.classList.add('dark');

  // Multilingual
  const texts = {
    en: { toolTitle:"Trend Popularity", codeTitle:"Live Demo: Jamstack + React Example", quizTitle:"Quiz: Web Trends 2025 (10 Qs)", perfTitle:"Performance Tracker", btnPDF:"Download Web Trends PDF" },
    hi: { toolTitle:"ट्रेंड लोकप्रियता", codeTitle:"लाइव डेमो: Jamstack + React उदाहरण", quizTitle:"प्रश्नोत्तरी: वेब ट्रेंड्स 2025 (10 प्रश्न)", perfTitle:"प्रदर्शन ट्रैकर", btnPDF:"वेब ट्रेंड्स PDF डाउनलोड करें" }
  };
  document.getElementById('langEn').onclick=()=>setLang('en');
  document.getElementById('langHi').onclick=()=>setLang('hi');
  function setLang(l){
    ["toolTitle","codeTitle","quizTitle","perfTitle","downloadPDF"].forEach(id=>document.getElementById(id).innerText=texts[l][id]);
    document.getElementById('quizHint').innerText='';
  }

  // Trend Chart
  const trendCtx = document.getElementById('trendChart').getContext('2d');
  new Chart(trendCtx, {
    type:'bar',
    data:{
      labels:['Jamstack','React','PWA','WebAssembly','AI/ML'],
      datasets:[{label:'Growth (%)', data:[45,60,50,30,55], backgroundColor:'#00897b'}]
    },
    options:{responsive:true}
  });

  // Live React Demo Runner
  function runDemo(){
    const code = document.getElementById('codeDemo').value;
    try {
      const transpiled = Babel.transform(code, { presets: ['react'] }).code;
      const container = document.getElementById('liveOutput');
      new Function('React','ReactDOM', 'container', transpiled)(React, ReactDOM, container);
    } catch(e){
      document.getElementById('liveOutput').innerText='Error: '+e.message;
    }
  }

  // Quiz logic
  const quizData = [
    {q:"Jamstack is built on?", choices:["Server-side rendering","API endpoints & SPAs","Desktop software","Mainframes"], ans:1, hint:"JavaScript + APIs"},
    // add 9 others ...
  ];
  let curr=0,score=0;
  const qQ = document.getElementById('quizQuestion'), qOpt = document.getElementById('quizOptions'),
        qHint = document.getElementById('quizHint'), qFB = document.getElementById('quizFeedback'),
        qBar = document.getElementById('quizBar');
  function loadQuiz(){
    const d=quizData[curr];
    qQ.innerText=d.q; qOpt.innerHTML=''; qHint.innerText=''; qFB.innerText='';
    d.choices.forEach((c,i)=>{
      const b=document.createElement('button');b.className='btn';b.innerText=c;
      b.onclick=()=>{
        qFB.innerText=i===d.ans?"✅ Correct":"❌ Wrong";
        if(i===d.ans) score++;
        curr++; qBar.style.width=`${(curr/quizData.length)*100}%`;
        curr<quizData.length?setTimeout(loadQuiz,600):alert(`Done! Your score: ${score}/${quizData.length}`);
      };
      qOpt.appendChild(b);
    });
  }
  document.getElementById('startQuiz').onclick=()=>{curr=0;score=0; qBar.style.width="0%"; loadQuiz();};
  function showHint(){
    if(curr<quizData.length) qHint.innerText="💡 Hint: "+quizData[curr].hint;
  }

  // Performance Tracker
  const perfCtx = document.getElementById('perfChart').getContext('2d');
  const perfChart = new Chart(perfCtx,{
    type:'line',
    data:{labels:[],datasets:[{label:'Score %',data:[],backgroundColor:'#00897b'}]},
    options:{responsive:true,scales:{y:{beginAtZero:true,max:100}}}
  });
  document.getElementById('savePerf').onclick=()=>{
    perfChart.data.labels.push(`Run ${perfChart.data.labels.length+1}`);
    perfChart.data.datasets[0].data.push(Math.round((score/quizData.length)*100));
    perfChart.update(); alert("✅ Score saved!");
  };

  // PDF Download
  document.getElementById('downloadPDF').onclick=()=>alert("📥 PDF download starting...");

  // Push Notifications
  if(Notification.permission!=="denied"){
    Notification.requestPermission().then(p=>{
      if(p==="granted"){
        new Notification("EduIgnite Web Trends", { body:"Discover next‑gen web techniques today!" });
      }
    });
  }
</script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
