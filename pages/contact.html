<section class="section">
  <div class="kicker">Connect</div>
  <h2 class="h1">Contact</h2>
  <p class="muted">Have an opportunity or idea? Let’s ship something meaningful.</p>
</section>

<form id="contactForm" class="card" style="margin-top:18px;">
  <div class="row">
    <div>
      <label for="name">Name</label>
      <input id="name" name="name" placeholder="Your name" required />
    </div>
    <div>
      <label for="email">Email</label>
      <input id="email" name="email" type="email" placeholder="name@company.com" required />
    </div>
  </div>
  <div style="margin-top:12px;">
    <label for="message">Message</label>
    <textarea id="message" name="message" rows="5" placeholder="Tell me a bit about your goals…" required></textarea>
  </div>
  <div style="margin-top:12px;">
    <button class="btn btn-primary" type="submit">Send</button>
  </div>
  <p class="muted" style="margin-top:10px;">Tip: opens your email client with your message pre-filled.</p>
</form>
