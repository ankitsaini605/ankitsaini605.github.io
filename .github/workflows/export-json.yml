name: Export JSON from CSV

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn

      - name: Run sales exporter
        run: |
          if [ -f sales.csv ]; then
            python sales_export.py
          else
            echo "sales.csv not found, skipping."
          fi

      - name: Run churn exporter
        run: |
          if [ -f churn.csv ]; then
            python churn_export.py
          else
            echo "churn.csv not found, skipping."
          fi

      - name: Commit JSON outputs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add data/sales/*.json data/churn/*.json || true
          git commit -m "Update data JSON [ci]" || echo "No changes to commit"
          git push
