<header><h1>Aptitude Topic #74 – Ratio & Time</h1></header>
<main>
  <h3>Q: A and B can complete a task in 10 and 15 days. How long together?</h3>
  <p>✅ A's 1 day work = 1/10</p>
  <p>✅ B's 1 day work = 1/15</p>
  <p>✅ Together = 1/6 → Time = 6 days</p>
