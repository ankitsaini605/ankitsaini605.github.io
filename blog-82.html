<header><h1>🧠 Memory Hacks for Exams</h1></header>
<main>
<h2>🔁 Use Active Recall</h2>
<p>Close the book. Ask questions to yourself. Write answers from memory.</p>

<h2>🕒 Spaced Revision</h2>
<p>Revise Day 1 → Day 3 → Day 7 → Day 14 → Day 30. Never forget again.</p>

<h2>🛏️ Bedtime Review</h2>
<p>Spend 10 mins revising key points before sleeping.</p>
</main>
