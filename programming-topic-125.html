<!DOCTYPE html>
<html>
<head><title>C++ STL: Vector, Set, Map</title></head>
<body>
<h1>💻 STL in C++</h1>

<h2>📦 Vector</h2>
<pre>
vector<int> v = {{1, 2, 3}};
v.push_back(4);
for(int x : v) cout << x << " ";
</pre>

<h2>📁 Map</h2>
<pre>
map<string, int> mp;
mp["ankit"] = 22;
cout << mp["ankit"];  // 22
</pre>

<h2>🧺 Set</h2>
<pre>
set<int> s;
s.insert(5);
s.insert(5); // duplicate ignored
</pre>

<p>STL makes coding efficient for competitive & interviews</p>
</body></html>
