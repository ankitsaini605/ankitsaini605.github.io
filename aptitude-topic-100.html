<header><h1>Time & Work: Tips + Examples</h1></header>
<main>
  <h2>🔧 Formula</h2>
  <p><b>Work = Rate × Time</b> → A's Rate = 1/day</p>
  <h2>🧮 Example</h2>
  <p>A: 10 days, B: 15 days → Together = 1/10 + 1/15 = 1/6 → 6 days</p>
  <h2>🧠 Trick</h2>
  <p>Use LCM for Total Work: LCM(10,15) = 30 → A: 3/day, B: 2/day → Together: 5/day → 6 days</p>
