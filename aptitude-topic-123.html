<!DOCTYPE html>
<html><head><title>Speed, Time & Distance – Shortcuts</title></head><body>
<h1>📊 Speed, Time & Distance</h1>
<h2>📌 Formula</h2>
<p>Speed = Distance / Time</p>

<h2>📘 Units</h2>
<ul>
  <li>1 km/hr = 5/18 m/sec</li>
  <li>1 m/sec = 18/5 km/hr</li>
</ul>

<h2>🧮 Example</h2>
<p>Train covers 180 km in 3 hours → Speed = 60 km/h</p>

<h2>⚡ Shortcut</h2>
<p>If a person travels at 2 speeds for equal time: Avg Speed = (2xy)/(x+y)</p>
</body></html>
